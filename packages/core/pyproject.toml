[project]
name = "nudge-ai"
version = "0.1.0"
description = "Voice assistant that actually gets things done. Speak, and Nudge handles the rest."
authors = [{ name = "chiruu12" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.11"
keywords = ["voice-assistant", "ai-agent", "stt", "speech-to-text", "productivity"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]

dependencies = [
    "hive-agent[audio,hotkeys]>=0.4.1",
    "typer>=0.12",
    "rich>=13.0",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]
server = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[project.scripts]
nudge = "nudge.transport.cli:app"

[project.urls]
Homepage = "https://github.com/chiruu12/nudge"
Repository = "https://github.com/chiruu12/nudge"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nudge"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_return_any = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
