<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nudge — Voice-First Assistant</title>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #FF6B35;
      --green: #22C55E;
      --red: #EF4444;
      --heading: 'Cabinet Grotesk', sans-serif;
      --body: 'Instrument Sans', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #080808;
      color: #EDEDED;
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; font-size: inherit; }

    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes pulseGlow { 0%,100%{opacity:1;box-shadow:0 0 6px var(--red)} 50%{opacity:.6;box-shadow:0 0 12px var(--red)} }
    @keyframes pipeFlow { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes waveBar { 0%{transform:scaleY(.3)} 100%{transform:scaleY(1)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

    .scanlines{position:relative}
    .scanlines::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);pointer-events:none;z-index:2}
    .cursor-blink{animation:blink 1s step-end infinite}
    .rec-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulseGlow 1.5s ease-in-out infinite;vertical-align:middle;margin-right:6px}
    .pipe-conn{height:2px;flex:1;min-width:24px;flex-shrink:0;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);background-size:200% 100%;animation:pipeFlow 2s ease-in-out infinite}

    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
    ::selection{background:rgba(255,107,53,.3)}

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 768px) {
      .r-pipe-conn, .pipe-conn { height: 24px !important; width: 2px !important; min-width: unset !important; flex: none !important; }
      .r-grid-3 { grid-template-columns: 1fr !important; }
      .r-grid-2 { grid-template-columns: 1fr !important; }
      .r-flex-wrap { flex-wrap: wrap !important; }
      .r-hide { display: none !important; }
      .r-text-sm h1 { font-size: 40px !important; }
      .r-text-sm h2 { font-size: 28px !important; }
      .r-pad { padding-left: 20px !important; padding-right: 20px !important; }
      .r-nav { padding: 0 16px !important; gap: 16px !important; }
      .r-nav-links { display: none !important; }
      .r-hero-cta { flex-direction: column !important; align-items: stretch !important; }
      .r-split-text { font-size: 48px !important; }
      .r-pipeline { flex-direction: column !important; align-items: center !important; }
      .r-pipe-conn { width: 2px !important; height: 24px !important; min-width: unset !important; }
    }
    @media (max-width: 480px) {
      .r-split-text { font-size: 36px !important; }
      .r-text-sm h1 { font-size: 32px !important; }
    }
  </style>
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#FF6B35",
      "scanLines": true,
      "skipIntro": false
    }/*EDITMODE-END*/;
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="split-v3.jsx"></script>
  <script type="text/babel" src="dev-page-v3.jsx"></script>
  <script type="text/babel" src="pm-page-v3.jsx"></script>
  <script type="text/babel" src="app-v3.jsx"></script>
</body>
</html>
